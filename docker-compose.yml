services:
  mysql:
    image: mysql:8.0
    container_name: seguridad_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-seguridad}
      MYSQL_USER: ${DB_USER:-seguridad_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-seguridad_pass}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - mi_red_global
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seguridad_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-seguridad}
      DB_USER: ${DB_USER:-seguridad_user}
      DB_PASSWORD: ${DB_PASSWORD:-seguridad_pass}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_key_change_in_production}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mi_red_global

volumes:
  mysql_data:

networks:
  mi_red_global:
    external: true